# Hardin Streamline — Static Landing Page
# SSL is terminated at the VPS — nginx here just routes by Host header over the WireGuard tunnel

server {
    listen 80;
    server_name streamline.h4rdn.com;

    access_log /var/log/nginx/streamline-access.log;
    error_log  /var/log/nginx/streamline-error.log;

    root /var/www/streamline;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
