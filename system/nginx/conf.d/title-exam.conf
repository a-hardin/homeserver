# Title Examination Suite
# SSL is terminated at the VPS — nginx here just routes by Host header over the WireGuard tunnel

server {
    listen 80;
    server_name title-exam.h4rdn.com;

    access_log /var/log/nginx/title-exam-access.log;
    error_log  /var/log/nginx/title-exam-error.log;

    location / {
        proxy_pass         http://title-exam:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
