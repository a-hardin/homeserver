# Umami Analytics
# SSL is terminated at the VPS — nginx here just routes by Host header over the WireGuard tunnel

server {
    listen 80;
    server_name analytics.h4rdn.com;

    access_log /var/log/nginx/umami-access.log;
    error_log  /var/log/nginx/umami-error.log;

    location / {
        proxy_pass         http://umami:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
