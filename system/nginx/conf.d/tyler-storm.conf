# Tyler Storm Soccer — Static Site
# SSL is terminated at the VPS — nginx here just routes by Host header over the WireGuard tunnel

server {
    listen 80;
    server_name tylerstormsoccer.com;

    access_log /var/log/nginx/tyler-storm-access.log;
    error_log  /var/log/nginx/tyler-storm-error.log;

    root /var/www/tyler-storm;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
