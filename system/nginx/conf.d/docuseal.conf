# DocuSeal — document e-signing
# SSL is terminated at the VPS — nginx here just routes by Host header over the WireGuard tunnel

server {
    listen 80;
    server_name sign.h4rdn.com;

    access_log /var/log/nginx/docuseal-access.log;
    error_log  /var/log/nginx/docuseal-error.log;

    # PDF uploads / generated documents
    client_max_body_size 50m;

    location / {
        proxy_pass         http://docuseal:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (live form updates)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}