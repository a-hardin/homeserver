# Hardin Resources Inc — Static Landing Page
# SSL is terminated at the VPS — nginx here just routes by Host header over the WireGuard tunnel

server {
    listen 80;
    server_name hardinresources.com www.hardinresources.com;

    access_log /var/log/nginx/hardin-resources-access.log;
    error_log  /var/log/nginx/hardin-resources-error.log;

    root /var/www/hardin-resources;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /contact {
        proxy_pass http://n8n:5678/webhook/hardin-resources/contact;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
