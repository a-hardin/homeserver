# ----------------------------
# NETWORKS
# ----------------------------
# lan -> only reachable from home LAN
# vpn -> only reachable over WireGuard
# public -> exposed via reverse proxy only
# internal -> container-to-container only


networks:
  lan:
    driver: bridge
  vpn:
    driver: bridge
  public:
    driver: bridge
  internal:
    driver: bridge

# ----------------------------
# VOLUMES
# ----------------------------
volumes:
  db:
  nextcloud:

services:
  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Chicago
      SERVERURL: vps.yourdomain.com
      SERVERPORT: 51820
      PEERS: home
      PEERDNS: auto
      INTERNAL_SUBNET: 10.13.13.0
    volumes:
      - ./system/wireguard:/config
      - /lib/modules:/lib/modules
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - vpn
    restart: unless-stopped


# ----------------------------
# REVERSE PROXY (PUBLIC WEBSITES ONLY)
# ----------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./system/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./system/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - public
      - internal
    restart: unless-stopped

# ----------------------------
# GUACAMOLE (VPN + LAN ONLY)
# ----------------------------
  guacamole:
    image: guacamole/guacamole
    container_name: guacamole
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: db
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - guacd
      - db
    ports:
      - "8080:8080"
      # - "127.0.0.1:8080:8080"
    restart: unless-stopped
    networks:
      - vpn
      - lan
      - internal

  guacd:
    image: guacamole/guacd
    container_name: guacd
    restart: unless-stopped
    networks:
      - internal
  
# ----------------------------
# DATABASE (INTERNAL ONLY)
# ----------------------------
  db:
    image: mariadb:10.11
    container_name: mysql
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    restart: unless-stopped
    volumes:
      - ./system/db:/docker-entrypoint-initdb.d
      - ./system/db:/home
    networks:
      - internal
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}

# ----------------------------
# NEXTCLOUD (VPN + LAN ONLY)
# ----------------------------
  nextcloud:
    image: nextcloud
    container_name: nextcloud
    ports:
      - 8082:80
      # - "127.0.0.1:8082:80"
    networks:
      - vpn
      - lan
      - internal
    volumes:
      # - ./nextcloud:/var/www/html/data:cached
      - /media/external_1/nextcloud:/var/www/html/data:cached
    restart: unless-stopped

# ----------------------------
# JELLYFIN (LAN + VPN ONLY)
# ----------------------------
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
      - 8096:8096
      # - "127.0.0.1:8096:8096"
    user: 1000:1000
    # network_mode: "host"
    networks:
      - vpn
      - lan
      - internal
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      # - /path/to/config:/config
      # - /path/to/cache:/cache
      # - /path/to/media:/media
      # - /path/to/media2:/media2:ro
      # - /media/external_1/Plex/config:/config
      - /media/external_1/Plex/jellycache:/cache
      - /media/external_1/Plex/TV:/tv
      - /media/external_1/Plex/Movies:/movies:ro
      - /media/external_1/Plex/Daddy:/daddy:ro
      - /media/external_1/Plex/Mommy:/mommy:ro
      - /media/external_1/Plex/Shiloh:/shiloh:ro
      - /media/external_1/Plex/Story:/story:ro
      - /media/external_1/Plex/music:/music:ro
    restart: unless-stopped

# ----------------------------
# MQTT (VPN + LAN ONLY)
# ----------------------------
  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    volumes:
      - ./system/mosquitto/config:/mosquitto/config
      - ./system/mosquitto/data:/mosquitto/data
      - ./system/mosquitto/log:/mosquitto/log
    networks:
      - vpn
      - lan
      - internal
    ports:
      - 1883:1883
      - 9001:9001
      # - "127.0.0.1:1883:1883"
      # - "127.0.0.1:9001:9001"

# ----------------------------
# FALCON PLAYER / XLIGHTS (VPN + LAN ONLY)
# ----------------------------
  falcon:
    image: falconchristmas/fpp
    container_name: falcon-player
    ports:
      - "32320:32320"
      # - "127.0.0.1:32320:32320"
    networks:
      - vpn
      - lan
    restart: unless-stopped