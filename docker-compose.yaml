# ----------------------------
# NETWORKS
# ----------------------------
# lan -> only reachable from home LAN
# vpn -> only reachable over WireGuard
# public -> exposed via reverse proxy only
# internal -> container-to-container only


networks:
  wg_bridge:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.20.0/24
  lan:
    driver: bridge
  vpn:
    driver: bridge
  public:
    driver: bridge
  internal:
    driver: bridge

# ----------------------------
# VOLUMES
# ----------------------------
volumes:
  db:
  nextcloud:
  postgres_data:
  n8n_data:
  activepieces_data:
  redis_data:

services:
  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      # - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Chicago
      # SERVERURL: vps.yourdomain.com
      # SERVERPORT: 51820
      # PEERS: home
      # PEERDNS: auto
      # INTERNAL_SUBNET: 10.13.13.0
    volumes:
      - ./system/wireguard:/config
      # - /lib/modules:/lib/modules:ro
      # - /lib/modules:/lib/modules
    # ports:
    #   - "51820:51820/udp"
    # sysctls:
    #   - net.ipv4.conf.all.src_valid_mark=1
    networks:
      wg_bridge:
        ipv4_address: 10.20.20.2
    #   - vpn
    # network_mode: host
    restart: unless-stopped


# ----------------------------
# REVERSE PROXY (PUBLIC WEBSITES ONLY)
# ----------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./system/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./system/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - public
      - internal
    restart: unless-stopped

# ----------------------------
# GUACAMOLE (VPN + LAN ONLY)
# ----------------------------
  guacamole:
    image: guacamole/guacamole
    container_name: guacamole
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: db
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - guacd
      - db
    ports:
      - "8080:8080"
      # - "127.0.0.1:8080:8080"
    restart: unless-stopped
    networks:
      - vpn
      - lan
      - internal

  guacd:
    image: guacamole/guacd
    container_name: guacd
    restart: unless-stopped
    networks:
      - internal
  
# ----------------------------
# DATABASE (INTERNAL ONLY)
# ----------------------------
  db:
    image: mariadb:10.11
    container_name: mysql
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    restart: unless-stopped
    volumes:
      - ./system/db:/docker-entrypoint-initdb.d
      - ./system/db:/home
    networks:
      - internal
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
  

# ----------------------------
# Postgres (INTERNAL Only)
# ----------------------------
  postgres:
    image: postgres:18-bookworm
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=America/Chicago
      - PGDATA=/var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

# ----------------------------
# N8N (VPN and INTERNAL)
# ----------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"           # Access n8n at http://your-server-ip:5678
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_SSL=false
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}                         # Change if reverse proxy
      - GENERIC_TIMEZONE=America/Chicago                       # ← Your timezone
      - TZ=America/Chicago
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}               # ← CHANGE THIS (generate a strong one)
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}             # ← Change username
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}     # ← CHANGE THIS
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - vpn
      - internal
    depends_on:
      postgres:
        condition: service_healthy

# ----------------------------
# TITLE EXAM (PUBLIC via VPS nginx)
# ----------------------------
  title-exam:
    image: ghcr.io/${GITHUB_USERNAME}/title-exam-app:latest
    container_name: title-exam
    networks:
      - public
      - internal
    restart: unless-stopped

# ----------------------------
# OCR API (INTERNAL ONLY)
# ----------------------------
  ocr-api:
    build: ./system/ocr-api
    container_name: ocr-api
    networks:
      - internal
    restart: unless-stopped

# ----------------------------
# NEXTCLOUD (VPN + LAN ONLY)
# ----------------------------
  nextcloud:
    image: nextcloud
    container_name: nextcloud
    environment:
      - PHP_MEMORY_LIMIT=2G
    ports:
      - 8082:80
      # - "127.0.0.1:8082:80"
    networks:
      - vpn
      - lan
      - internal
    volumes:
      - /media/data_ssd/nextcloud:/var/www/html/data:cached
    tmpfs:
      - /tmp:rw,exec,nosuid,size=1g
    restart: unless-stopped

# ----------------------------
# JELLYFIN (LAN + VPN ONLY)
# ----------------------------
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
      - 8096:8096
      # - "127.0.0.1:8096:8096"
    user: 1000:1000
    # network_mode: "host"
    networks:
      - vpn
      - lan
      - internal
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      # - /path/to/config:/config
      # - /path/to/cache:/cache
      # - /path/to/media:/media
      # - /path/to/media2:/media2:ro
      # - /media/external_1/Plex/config:/config
      - /media/data_ssd/Plex/jellycache:/cache
      - /media/data_ssd/Plex/TV:/tv
      - /media/data_ssd/Plex/Movies:/movies:ro
      - /media/data_ssd/Plex/Daddy:/daddy:ro
      - /media/data_ssd/Plex/Mommy:/mommy:ro
      - /media/data_ssd/Plex/Shiloh:/shiloh:ro
      - /media/data_ssd/Plex/Story:/story:ro
      - /media/data_ssd/Plex/music:/music:ro
    restart: unless-stopped

# ----------------------------
# MQTT (VPN + LAN ONLY)
# ----------------------------
  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    volumes:
      - ./system/mosquitto/config:/mosquitto/config
      - ./system/mosquitto/data:/mosquitto/data
      - ./system/mosquitto/log:/mosquitto/log
    networks:
      - vpn
      - lan
      - internal
    ports:
      - 1883:1883
      - 9001:9001
      # - "127.0.0.1:1883:1883"
      # - "127.0.0.1:9001:9001"


# ----------------------------
# Redis (VPN + LAN ONLY)
# ----------------------------
  redis:
    image: redis:8.4-bookworm
    container_name: redis
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redis_data:/data     # optional but recommended for persistence
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ----------------------------
# Redis (VPN + LAN ONLY)
# ----------------------------
  activepieces:
    image: ghcr.io/activepieces/activepieces:0.75.0   # or :0.x.y for pinning version
    container_name: activepieces
    restart: unless-stopped
    privileged: true
    ports:
      # - "3000:3000"
      - "8081:80"
    environment:
      - AP_ENCRYPTION_KEY=${AP_ENCRYPTION_KEY}
      - AP_JWT_SECRET=${AP_JWT_SECRET}
      - AP_FRONTEND_URL=${AP_FRONTEND_URL}
      - AP_POSTGRES_DATABASE=${AP_POSTGRES_DATABASE}
      - AP_POSTGRES_HOST=${AP_POSTGRES_HOST}
      - AP_POSTGRES_PASSWORD=${AP_POSTGRES_PASSWORD}
      - AP_POSTGRES_PORT=${AP_POSTGRES_PORT}
      - AP_POSTGRES_USERNAME=${AP_POSTGRES_USERNAME}
      - AP_REDIS_HOST=${AP_REDIS_HOST}
      - AP_REDIS_PORT=${AP_REDIS_PORT}
      # Optional tuning / security
      - AP_EXECUTION_MODE=${AP_EXECUTION_MODE}
      - AP_DEV_PIECES_SYNC_ON_START=true
      - TZ=America/Chicago
    volumes:
      - activepieces_data:/root/.activepieces   # optional
      - ./cache:/usr/src/app/cache
    networks:
      - vpn
      - lan
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


# ----------------------------
# PORTAINER (VPN + LAN ONLY)
# ----------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./system/portainer:/data
    ports:
      - "9000:9000"
      # - "127.0.0.1:9000:9000"
    networks:
      - vpn
      - lan
    restart: unless-stopped